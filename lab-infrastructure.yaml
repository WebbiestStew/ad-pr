AWSTemplateFormatVersion: "2010-09-09"
Description: Infraestructura IaC para Learner Lab. EC2 + S3.

Parameters:
  BucketSuffix:
    Type: String
    Default: "mylab"

Resources:

  LabBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "lab-bucket-${BucketSuffix}-${AWS::AccountId}"
      Tags:
        - Key: Project
          Value: LearnerLab

  LabSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Permite SSH"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  LabEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      SecurityGroupIds:
        - !Ref LabSecurityGroup
      Tags:
        - Key: Name
          Value: LabEC2-CloudFormation

Outputs:
  InstanceId:
    Value: !Ref LabEC2Instance
  PublicIP:
    Value: !GetAtt LabEC2Instance.PublicIp
  BucketName:
    Value: !Ref LabBucket
