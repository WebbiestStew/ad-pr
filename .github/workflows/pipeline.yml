name: CI-CD
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build
        run: docker build -t app .
      - name: Run
        run: docker run -d -p 8080:80 app
      - name: Rollback on failure
        if: failure()
        run: bash rollback.sh
